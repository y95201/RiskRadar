<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OfferGuard - 货源风险监控</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <!-- Header -->
        <header class="popup-header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
                <span>OfferGuard</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="popup-content">
            <!-- Product Info Section -->
            <div id="product-section" class="section">
                <div class="section-title">商品信息</div>
                
                <div id="product-card" class="product-card">
                    <div class="product-image-wrapper">
                        <img id="product-image" src="" alt="商品图片" class="product-image">
                        <div id="image-placeholder" class="image-placeholder">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                        </div>
                    </div>
                    
                    <div class="product-info">
                        <div class="product-title" id="product-title">加载中...</div>
                        <div class="product-meta">
                            <div class="meta-item">
                                <span class="meta-label">Offer ID</span>
                                <span class="meta-value" id="product-offer-id">-</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">价格</span>
                                <span class="meta-value price" id="product-price">-</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Status Section -->
            <div id="status-section" class="section">
                <div class="status-badge" id="status-badge">
                    <span class="status-icon"></span>
                    <span class="status-text" id="status-text">检测配额: 3次</span>
                </div>
            </div>

            <!-- Detection Result Section -->
            <div id="result-section" class="section hidden">
                <div class="section-title">检测结果</div>
                
                <div class="result-card">
                    <!-- 1688 Status -->
                    <div class="result-item">
                        <div class="result-label">1688状态</div>
                        <div class="result-value" id="result-1688">
                            <span class="loading-dots">检测中...</span>
                        </div>
                    </div>
                    
                    <!-- Trademark Risk -->
                    <div class="result-item">
                        <div class="result-label">商标风险</div>
                        <div class="result-value" id="result-trademark">
                            <span class="loading-dots">检测中...</span>
                        </div>
                    </div>

                    <!-- Reason -->
                    <div class="result-reason" id="result-reason"></div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="actions">
                <button id="detect-btn" class="btn btn-primary">
                    <span class="btn-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                            <path d="M3 3v5h5"/>
                            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
                            <path d="M16 21h5v-5"/>
                        </svg>
                    </span>
                    <span class="btn-text">立即检测风险</span>
                </button>

                <button id="monitor-btn" class="btn btn-secondary hidden">
                    <span class="btn-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                        </svg>
                    </span>
                    <span class="btn-text">加入持续监控</span>
                </button>
            </div>

            <!-- Settings Section -->
            <div class="settings-section">
                <button id="settings-toggle" class="settings-toggle">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    <span>设置</span>
                </button>

                <div id="settings-panel" class="settings-panel hidden">
                    <div class="settings-group">
                        <label class="settings-label">API Token (登录后)</label>
                        <input type="text" id="api-token" class="settings-input" placeholder="输入您的API Token">
                        <button id="save-token-btn" class="btn btn-sm btn-primary">保存</button>
                    </div>
                    <div class="settings-group">
                        <label class="settings-label">Device ID</label>
                        <div class="settings-value" id="device-id-display">-</div>
                    </div>
                    <div class="settings-group">
                        <button id="clear-token-btn" class="btn btn-sm btn-danger">清除Token</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="popup-footer">
            <span>OfferGuard v1.0.0</span>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>
</html>
